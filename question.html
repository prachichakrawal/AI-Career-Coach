<!DOCTYPE html>
<html>
<head>
    <title>Question</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6366f1, #9333ea);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 750px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .progress {
            font-weight: bold;
            color: #4f46e5;
        }

        .timer {
            font-weight: bold;
            color: white;
            background: #ef4444;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .question-box {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 130px;
            border-radius: 12px;
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 15px;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 5px rgba(99,102,241,0.5);
        }

        .btns {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .submit {
            background: #4f46e5;
            color: white;
        }

        .submit:hover {
            background: #4338ca;
            transform: scale(1.05);
        }

        .skip {
            background: #ef4444;
            color: white;
        }

        .skip:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .final {
            background: black;
            color: white;
        }

        .final:hover {
            background: #111827;
            transform: scale(1.05);
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="header">
            <div class="progress">Question {{index}}</div>
            <div class="timer">⏱ <span id="time">60</span>s</div>
        </div>

        <div class="question-box">
            {{question}}
        </div>

        <form method="post" id="quizForm">
            <textarea id="answerBox" name="answer" placeholder="Type your answer..."></textarea>
            <div class="char-count" id="charCount">0 characters</div>

            <div class="btns">
                <button type="submit" class="submit">Submit</button>

                <button type="submit" name="skip" value="yes" class="skip">
                    Skip
                </button>

                <button type="submit" name="final_submit" value="yes" class="final">
                    Finish Test
                </button>
            </div>
        </form>

    </div>
</div>

<script>
let time = 60;
let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
        clearInterval(timer);
        document.getElementById("quizForm").submit();
    }
}, 1000);

//Character counter
const textarea = document.getElementById("answerBox");
const counter = document.getElementById("charCount");

textarea.addEventListener("input", () => {
    counter.innerText = textarea.value.length + " characters";
});
</script>

</body>
</html>
