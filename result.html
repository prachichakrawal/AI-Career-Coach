<!DOCTYPE html>
<html>
<head>
    <title>Interview Result</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            margin: 0;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        /* 🌌 Animated Background Glow */
        body::before {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8B5CF6, transparent);
            top: -100px;
            left: -100px;
            filter: blur(120px);
            animation: float 8s infinite alternate;
        }

        body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #22D3EE, transparent);
            bottom: -100px;
            right: -100px;
            filter: blur(120px);
            animation: float 10s infinite alternate-reverse;
        }

        @keyframes float {
            from { transform: translateY(0px); }
            to { transform: translateY(40px); }
        }

        h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #22D3EE, #8B5CF6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            color: #cbd5f5;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        /*  Glass Card */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease-in-out;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        .question {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0e7ff;
        }

        .answer {
            margin-bottom: 8px;
            color: #cbd5f5;
        }

        .evaluation {
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
        }

        .good {
            background: rgba(34,197,94,0.2);
            color: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .average {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }

        .bad {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        /*  Button */
        .btn {
            display: block;
            margin: 40px auto;
            padding: 14px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #22D3EE, #8B5CF6);
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px #8B5CF6;
        }
    </style>
</head>

<body>

<h2> Interview Result</h2>

<div class="summary">
    Total Questions: {{results|length}}
</div>

<div class="container">

{% for r in results %}
<div class="card">
    
    <div class="question">Q: {{r.question}}</div>

    <div class="answer">
        <b>Your Answer:</b> {{r.answer}}
    </div>

    <div>
        <b>Evaluation:</b>
        <span class="
            {% if 'Excellent' in r.evaluation or 'Strong' in r.evaluation %}
                good
            {% elif 'Try' in r.evaluation or 'partially' in r.evaluation %}
                average
            {% else %}
                bad
            {% endif %}
        ">
            {{r.evaluation}}
        </span>
    </div>

</div>
{% endfor %}

</div>

<button class="btn" onclick="window.location.href='/'">
     Try Again
</button>

</body>
</html>
