<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            margin: 0;
            padding: 20px;
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .summary {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        .question {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .answer {
            margin-bottom: 8px;
        }

        .evaluation {
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .good {
            background: #dcfce7;
            color: #166534;
        }

        .average {
            background: #fef9c3;
            color: #854d0e;
        }

        .bad {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn {
            display: block;
            margin: 30px auto;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #111827;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h2>Your Interview Result</h2>

<div class="summary">
    Total Questions: {{results|length}}
</div>

<div class="container">

{% for r in results %}
<div class="card">
    
    <div class="question">Q: {{r.question}}</div>

    <div class="answer">
        <b>Your Answer:</b> {{r.answer}}
    </div>

    <div>
        <b>Evaluation:</b>
        <span class="
            {% if 'Excellent' in r.evaluation or 'Strong' in r.evaluation %}
                good
            {% elif 'average' in r.evaluation or 'Try' in r.evaluation %}
                average
            {% else %}
                bad
            {% endif %}
        ">
            {{r.evaluation}}
        </span>
    </div>

</div>
{% endfor %}

</div>

<button class="btn" onclick="window.location.href='/'">
     Try Again
</button>

</body>
</html>
