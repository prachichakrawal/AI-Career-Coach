 <!DOCTYPE html>
 <html>
    <head>
        <title>Resume Analyser </title>
        <style>
            body {
                font-family:'Segoe UI',sans-serif;
                background-color: #f4f6f9;
                margin: 0;
            }
            .navbar{
                background-color: #1f2937;
                color:white;
                padding: 15px 30px;
                font-size:18px;
                font-weight:bold;            }
            .container{
                background:white;
                max-width: 600px;
                margin: 50px auto;
                padding:30px;
                border-radius: 10px;
                box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
                      }
            h2{
                margin-top: 20px;
                color:#111827;
            }
            label{
                font-size:14px;
                font-weight: 600;
                color: #374151;
            }
            
            textarea,input{
                width:100%;
                padding:12px;
                margin-top:50px;
                margin-bottom: 20px;
                border:1px solid #d1d5db;
                border-radius: 6px;
                font-size: 14px;
            }
            textarea:focus, input:focus{
                border-color: #2563eb;
                outline:none;


            }
            button{
                width:100%;
                padding: 12px;
                background-color: #2563eb;
                color: white;
                border:none;
                border: radius 6px;
                font-size: 15px;
                font-weight:600;
                cursor:pointer;

            }
            button:hover{
                background-color:#1d4ed8;
                                    
            }
            .footer{
                text-align: centre;
                margin-top: 20px;
                font-size: 12px;
                color: gray;
            }
        
        </style>
     </head>
        <body> 
            <div class="navbar">
                Smart Resume Analyzer
            </div>
            <div class="container">
                <h2>Analyze Your Resume</h2>
                <form action="/analyse" method="post"
                enctype="multipart/form-data">
                    <label>Resume Content</label>
                    <label> Upload Resume</label>
                    <input type="file" name="resume_file"
                    accept=".pdf"> <br><br>
                    <label>Job Keywords</label>
                    <input type="text" name="keywords" placeholder="e.g. python,sql,react...">
                    <button type="submit"> Analyse Resume</button>

                </form>   

            </div>
            <div class="footer">
                &copy;2026 Resume Analyzer| Built for placement preparation

            </div>
        </body>
 </html>
