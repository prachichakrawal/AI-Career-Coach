<!DOCTYPE html>
<html>
<head>
    <title>Select Subject</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            color: white;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Start Mock Interview</h2>

    <form action="/start_test" method="post">
        <select name="skill" required>
            {% for s in skills %}
            <option value="{{s}}">{{s}}</option>
            {% endfor %}
        </select>

        <button type="submit">Start Test</button>
    </form>
</div>

</body>
</html>
